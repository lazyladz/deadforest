<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Combat Trainer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#060a0f;overflow:hidden;font-family:'Rajdhani',sans-serif;color:#aaffaa;}

#topbar{position:fixed;top:0;left:0;right:0;z-index:20;height:48px;
  display:flex;justify-content:space-between;align-items:center;
  padding:0 24px;background:rgba(4,8,16,.92);
  border-bottom:1px solid rgba(80,200,80,.15);}
#topbar h1{font-family:'Orbitron',monospace;font-size:14px;letter-spacing:6px;color:#88ffaa;font-weight:700;}
#hint{font-size:12px;letter-spacing:3px;color:rgba(150,220,150,.4);}

#viewport{position:fixed;top:48px;left:0;right:0;bottom:70px;}

/* Bottom HUD */
#hud{position:fixed;bottom:0;left:0;right:0;height:70px;
  background:rgba(3,7,16,.92);border-top:1px solid rgba(80,200,80,.14);
  display:flex;align-items:center;justify-content:center;gap:32px;padding:0 28px;}
.hitem{text-align:center;}
.hlbl{font-size:10px;letter-spacing:4px;color:rgba(120,200,130,.45);font-family:'Orbitron',monospace;}
.hval{font-size:18px;font-family:'Orbitron',monospace;color:#aaffaa;font-weight:700;
  text-shadow:0 0 12px rgba(80,255,80,.2);}
#animbar{width:200px;}
#animlbl{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:4px;color:#66ffaa;
  text-align:center;margin-bottom:5px;}
#progwrap{width:200px;height:3px;background:rgba(255,255,255,.07);border-radius:2px;}
#prog{height:100%;width:0;background:linear-gradient(90deg,#228844,#55ff88);border-radius:2px;}

/* Hit flash overlay */
#hitflash{position:fixed;inset:0;pointer-events:none;z-index:15;
  background:rgba(255,80,0,.18);opacity:0;transition:opacity .08s;}

/* Loading */
#loading{position:fixed;inset:0;background:#060a0f;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
#loading h2{font-family:'Orbitron',monospace;font-size:20px;letter-spacing:10px;
  color:#aaffaa;text-shadow:0 0 40px rgba(80,255,80,.3);font-weight:900;}
#lbar{width:320px;height:4px;background:rgba(255,255,255,.08);
  border:1px solid rgba(80,200,80,.25);border-radius:2px;}
#lfill{height:100%;width:0;background:linear-gradient(90deg,#228822,#55ff55);
  border-radius:2px;transition:width .3s;box-shadow:0 0 10px rgba(80,255,80,.4);}
#lsub{font-family:'Rajdhani',sans-serif;font-size:14px;letter-spacing:5px;
  color:rgba(150,220,150,.6);font-weight:600;}
</style>
</head>
<body>

<div id="loading">
  <h2>COMBAT TRAINER</h2>
  <div id="lbar"><div id="lfill"></div></div>
  <div id="lsub">INITIALIZING...</div>
</div>

<div id="topbar">
  <h1>COMBAT TRAINER</h1>
  <div id="hint">DRAG TO ROTATE &nbsp;·&nbsp; SCROLL TO ZOOM</div>
</div>

<div id="viewport"></div>
<div id="hitflash"></div>

<div id="hud">
  <div class="hitem">
    <div class="hlbl">COMBO</div>
    <div class="hval" id="comboVal">0</div>
  </div>
  <div class="hitem">
    <div class="hlbl">HITS</div>
    <div class="hval" id="hitsVal">0</div>
  </div>
  <div id="animbar">
    <div id="animlbl">WALK</div>
    <div id="progwrap"><div id="prog"></div></div>
  </div>
  <div class="hitem">
    <div class="hlbl">ROUND</div>
    <div class="hval" id="roundVal">1</div>
  </div>
  <div class="hitem">
    <div class="hlbl">PATTERN</div>
    <div class="hval" id="patternVal">—</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
function setLoad(pct, txt) {
  document.getElementById('lfill').style.width = pct + '%';
  if (txt) document.getElementById('lsub').textContent = txt;
}
function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src; s.onload = res;
    s.onerror = () => rej(new Error('Failed: ' + src));
    document.head.appendChild(s);
  });
}

// ── State ─────────────────────────────────────────────────────────────
let mixer = null;
let clips = { walk: null, punch: null, swipe: null };
let actions = {};
let currentAnim = 'walk';
let combo = 0, hits = 0, round = 1;
const clock = new THREE.Clock();

// Combat pattern sequences — walk in → attack combos
const PATTERNS = [
  ['walk','punch','walk'],
  ['walk','swipe','walk'],
  ['walk','punch','swipe','walk'],
  ['walk','swipe','punch','walk'],
  ['walk','punch','punch','walk'],
  ['walk','swipe','swipe','punch','walk'],
];
let patternQueue = [];
let patternIndex = 0;
let patternRunning = false;

// ── Renderer / Scene ──────────────────────────────────────────────────
const vpEl = document.getElementById('viewport');
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setClearColor(0x060a0f, 1);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
vpEl.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x060a0f);
scene.fog = new THREE.FogExp2(0x060a0f, 0.022);

// Lighting
scene.add(new THREE.HemisphereLight(0x1a2a4a, 0x0a160a, 3.0));
scene.add(new THREE.AmbientLight(0x1a2a3a, 1.5));
const key = new THREE.DirectionalLight(0xaabbdd, 3.5);
key.position.set(5, 12, 7); key.castShadow = true;
key.shadow.mapSize.set(1024, 1024); scene.add(key);
const fill = new THREE.DirectionalLight(0x334455, 1.2);
fill.position.set(-5, 3, -4); scene.add(fill);
const rim = new THREE.DirectionalLight(0x112233, 1.0);
rim.position.set(0, 5, -8); scene.add(rim);
// Orange training light
const trainLight = new THREE.PointLight(0x331a00, 3.0, 10);
trainLight.position.set(0, 0.5, 0); scene.add(trainLight);

// Ground
const ground = new THREE.Mesh(
  new THREE.CircleGeometry(14, 64),
  new THREE.MeshLambertMaterial({ color: 0x060c06 })
);
ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; scene.add(ground);
// Ring markings
const ringGeo = new THREE.RingGeometry(2.8, 3.0, 64);
const ringMat = new THREE.MeshBasicMaterial({ color: 0x1a3a1a, side: THREE.DoubleSide });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = -Math.PI / 2; ring.position.y = 0.003; scene.add(ring);
const ring2Geo = new THREE.RingGeometry(4.8, 5.0, 64);
const ring2 = new THREE.Mesh(ring2Geo, new THREE.MeshBasicMaterial({ color: 0x112211, side: THREE.DoubleSide }));
ring2.rotation.x = -Math.PI / 2; ring2.position.y = 0.003; scene.add(ring2);
const grid = new THREE.GridHelper(20, 20, 0x111a11, 0x0a120a);
grid.position.y = 0.002; scene.add(grid);

// Camera
let camera = new THREE.PerspectiveCamera(50, 1, 0.01, 200);
let rotX = 0.22, rotY = 0.0, radius = 6.5, lookY = 1.2;
function updateCam() {
  camera.position.x = Math.sin(rotY) * Math.cos(rotX) * radius;
  camera.position.y = Math.sin(rotX) * radius + lookY;
  camera.position.z = Math.cos(rotY) * Math.cos(rotX) * radius;
  camera.lookAt(0, lookY, 0);
}

function resizeRenderer() {
  const W = vpEl.clientWidth, H = vpEl.clientHeight;
  renderer.setSize(W, H);
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  updateCam();
}
resizeRenderer();
window.addEventListener('resize', resizeRenderer);

// Orbit
let drag = false, lx = 0, ly = 0;
renderer.domElement.addEventListener('mousedown', e => { drag=true; lx=e.clientX; ly=e.clientY; });
window.addEventListener('mouseup', () => drag=false);
window.addEventListener('mousemove', e => {
  if (!drag) return;
  rotY -= (e.clientX-lx)*.009; rotX -= (e.clientY-ly)*.007;
  rotX = Math.max(-0.2, Math.min(1.3, rotX));
  lx=e.clientX; ly=e.clientY; updateCam();
});
renderer.domElement.addEventListener('wheel', e => {
  radius = Math.max(2, Math.min(16, radius+e.deltaY*.012)); updateCam();
});

// ── Practice Dummy ────────────────────────────────────────────────────
const dummyGroup = new THREE.Group();
dummyGroup.position.set(0, 0, -1.6);
scene.add(dummyGroup);

const woodMat = new THREE.MeshLambertMaterial({ color: 0x5a3a1a });
const darkMat = new THREE.MeshLambertMaterial({ color: 0x3a2010 });
const metalMat = new THREE.MeshLambertMaterial({ color: 0x2a2a2a });

// Post / pole
const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.08, 2.4, 8), woodMat);
pole.position.y = 1.2; pole.castShadow = true; dummyGroup.add(pole);

// Base
const base = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.45, 0.18, 12), darkMat);
base.position.y = 0.09; base.castShadow = true; dummyGroup.add(base);
const baseRing = new THREE.Mesh(new THREE.TorusGeometry(0.38, 0.04, 8, 24), metalMat);
baseRing.position.y = 0.12; dummyGroup.add(baseRing);

// Body (torso pad)
const body = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.18, 0.7, 10), woodMat);
body.position.y = 1.7; body.castShadow = true; dummyGroup.add(body);
const bodyWrap = new THREE.Mesh(new THREE.CylinderGeometry(0.24, 0.20, 0.68, 10),
  new THREE.MeshLambertMaterial({ color: 0x8B1a1a }));
bodyWrap.position.y = 1.7; dummyGroup.add(bodyWrap);

// Head (ball)
const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 12, 10), woodMat);
head.position.y = 2.25; head.castShadow = true; dummyGroup.add(head);
// Face marks
const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 6),
  new THREE.MeshLambertMaterial({ color: 0x1a0a0a }));
eyeL.position.set(-0.09, 2.28, 0.19); dummyGroup.add(eyeL);
const eyeR = eyeL.clone(); eyeR.position.set(0.09, 2.28, 0.19); dummyGroup.add(eyeR);

// Horizontal arm bar
const armBar = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.045, 1.4, 8), woodMat);
armBar.rotation.z = Math.PI / 2; armBar.position.y = 1.85; armBar.castShadow = true;
dummyGroup.add(armBar);
// Arm pads
const padGeo = new THREE.CylinderGeometry(0.09, 0.09, 0.28, 8);
const padMat = new THREE.MeshLambertMaterial({ color: 0x8B1a1a });
const padL = new THREE.Mesh(padGeo, padMat);
padL.rotation.z = Math.PI/2; padL.position.set(-0.62, 1.85, 0); dummyGroup.add(padL);
const padR = padL.clone(); padR.position.set(0.62, 1.85, 0); dummyGroup.add(padR);

// Metal bolts
for (const [x,y,z] of [[0,1.55,0.23],[0,1.85,0.23],[0,2.05,0.06]]) {
  const bolt = new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.025,0.05,6), metalMat);
  bolt.position.set(x,y,z); dummyGroup.add(bolt);
}

// Dummy reaction state
let dummyHitT = 0;
let dummyOrigRot = 0;

function hitDummy() {
  dummyHitT = 0.35;
  hits++;
  combo++;
  document.getElementById('hitsVal').textContent = hits;
  document.getElementById('comboVal').textContent = combo;
  // Flash
  const fl = document.getElementById('hitflash');
  fl.style.opacity = 1;
  setTimeout(() => fl.style.opacity = 0, 80);
  // Eye glow red on hit
  eyeL.material = new THREE.MeshLambertMaterial({ color: 0xff2200, emissive: new THREE.Color(0.5,0,0) });
  eyeR.material = eyeL.material.clone();
  setTimeout(() => {
    eyeL.material = new THREE.MeshLambertMaterial({ color: 0x1a0a0a });
    eyeR.material = eyeL.material.clone();
  }, 200);
}

// ── Animation sequencer ───────────────────────────────────────────────
function buildQueue() {
  // Pick a pattern based on round
  const p = PATTERNS[Math.floor(Math.random() * Math.min(round + 1, PATTERNS.length))];
  patternQueue = [...p];
  patternIndex = 0;
  document.getElementById('patternVal').textContent =
    p.filter(a => a !== 'walk').map(a => a.toUpperCase()).join(' + ');
  if (round > 1 && round % 3 === 0) combo = 0; // reset combo every 3 rounds
}

function playNext() {
  if (patternIndex >= patternQueue.length) {
    // Pattern done — pause, then next round
    patternRunning = false;
    round++;
    document.getElementById('roundVal').textContent = round;
    setTimeout(() => {
      buildQueue();
      playStep();
    }, 800);
    return;
  }
  playStep();
}

function playStep() {
  const step = patternQueue[patternIndex];
  patternIndex++;
  patternRunning = true;
  playAnim(step, () => playNext());
}

function playAnim(name, onDone) {
  if (!mixer || !actions[name]) {
    if (onDone) onDone();
    return;
  }
  const prev = actions[currentAnim];
  const next = actions[name];
  currentAnim = name;

  document.getElementById('animlbl').textContent = name.toUpperCase();

  next.reset();
  const isLoop = name === 'walk';
  next.setLoop(isLoop ? THREE.LoopRepeat : THREE.LoopOnce, isLoop ? Infinity : 1);
  next.clampWhenFinished = true;
  if (prev && prev !== next) next.crossFadeFrom(prev, 0.18, true);
  next.play();

  // Trigger hit on attack animations at ~60% through
  if (name === 'punch' || name === 'swipe') {
    const clip = next.getClip();
    setTimeout(() => { hitDummy(); }, clip.duration * 600);
  }

  if (!isLoop && onDone) {
    const onFinished = (ev) => {
      if (ev.action !== next) return;
      mixer.removeEventListener('finished', onFinished);
      onDone();
    };
    mixer.addEventListener('finished', onFinished);
  }

  // Walk auto-completes after a fixed time so it doesn't loop forever
  if (isLoop && onDone) {
    const walkDur = name === 'walk' ? 1200 : 800;
    setTimeout(() => {
      if (currentAnim === 'walk') onDone();
    }, walkDur);
  }
}

// ── Boot ─────────────────────────────────────────────────────────────
async function boot() {
  setLoad(10, 'Loading FBX parser...');
  await loadScript('https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/libs/fflate.min.js');
  await loadScript('https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/FBXLoader.js');
  await loadScript('https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/utils/SkeletonUtils.js');

  const loader = new THREE.FBXLoader();
  function loadFBX(path) {
    return new Promise((res, rej) => loader.load(path, res, undefined, rej));
  }

  // ── Load Walking.fbx (model + walk anim) ────────────────────────
  setLoad(25, 'Loading Walking.fbx...');
  let baseFBX;
  try {
    baseFBX = await loadFBX('Walking.fbx');
    clips.walk = baseFBX.animations.find(a =>
      a.name.toLowerCase().includes('walk') || a.name.toLowerCase().includes('mixamo')
    ) || baseFBX.animations[0];
    console.log('Walk clip:', clips.walk?.name);
  } catch(e) {
    document.getElementById('lsub').textContent = '✗ Walking.fbx not found';
    return;
  }

  // Scale + position: character faces the dummy
  const box = new THREE.Box3().setFromObject(baseFBX);
  const h = box.max.y - box.min.y;
  baseFBX.scale.setScalar(2.2 / Math.max(h, 0.01));
  const box2 = new THREE.Box3().setFromObject(baseFBX);
  baseFBX.position.y = -box2.min.y;

  baseFBX.traverse(c => {
    if (!c.isMesh) return;
    c.castShadow = true; c.receiveShadow = true;
    const mats = Array.isArray(c.material) ? c.material : [c.material];
    mats.forEach(m => {
      if (m.map) { m.map.encoding = THREE.sRGBEncoding; m.map.needsUpdate = true; }
      m.needsUpdate = true;
    });
  });

  const model = THREE.SkeletonUtils.clone(baseFBX);
  // Position character facing the dummy
  model.position.set(0, 0, 1.4);
  model.rotation.y = Math.PI; // face toward dummy
  scene.add(model);
  mixer = new THREE.AnimationMixer(model);

  // ── Load Mutant_Punch.fbx ───────────────────────────────────────
  setLoad(55, 'Loading Mutant_Punch.fbx...');
  try {
    const punchFBX = await loadFBX('Mutant_Punch.fbx');
    clips.punch = punchFBX.animations[0];
    console.log('Punch clip:', clips.punch?.name);
  } catch(e) { console.warn('Mutant_Punch.fbx:', e.message); }

  // ── Load Mutant_Swiping.fbx ─────────────────────────────────────
  setLoad(80, 'Loading Mutant_Swiping.fbx...');
  try {
    const swipeFBX = await loadFBX('Mutant_Swiping.fbx');
    clips.swipe = swipeFBX.animations[0];
    console.log('Swipe clip:', clips.swipe?.name);
  } catch(e) { console.warn('Mutant_Swiping.fbx:', e.message); }

  // ── Register actions ────────────────────────────────────────────
  if (clips.walk)  actions.walk  = mixer.clipAction(clips.walk);
  if (clips.punch) actions.punch = mixer.clipAction(clips.punch);
  if (clips.swipe) actions.swipe = mixer.clipAction(clips.swipe);

  // Start idle walk then begin pattern loop
  if (actions.walk) {
    actions.walk.setLoop(THREE.LoopRepeat, Infinity);
    actions.walk.play();
  }

  setLoad(100, 'Ready!');
  await new Promise(r => setTimeout(r, 400));
  document.getElementById('loading').style.display = 'none';

  // Kick off pattern sequence after short delay
  buildQueue();
  setTimeout(() => playStep(), 1200);

  // ── Render loop ─────────────────────────────────────────────────
  function loop() {
    requestAnimationFrame(loop);
    const dt = Math.min(clock.getDelta(), 0.05);
    const elapsed = clock.getElapsedTime();

    if (mixer) mixer.update(dt);

    // Dummy wobble on hit
    if (dummyHitT > 0) {
      dummyHitT -= dt;
      const swing = Math.sin(dummyHitT * 28) * 0.08 * (dummyHitT / 0.35);
      dummyGroup.rotation.z = swing;
      dummyGroup.rotation.x = swing * 0.3;
      head.position.y = 2.25 + Math.abs(Math.sin(dummyHitT * 22)) * 0.04;
    } else {
      dummyGroup.rotation.z *= 0.88;
      dummyGroup.rotation.x *= 0.88;
      head.position.y = 2.25;
    }

    // Subtle dummy idle sway
    dummyGroup.rotation.y = Math.sin(elapsed * 0.4) * 0.03;

    // Progress bar
    const cur = actions[currentAnim];
    if (cur && cur.getClip()) {
      const dur = cur.getClip().duration;
      document.getElementById('prog').style.width = ((cur.time / dur) * 100).toFixed(1) + '%';
    }

    // Pulsing train light
    trainLight.intensity = 3.0 + Math.sin(elapsed * 1.8) * 0.5;

    renderer.render(scene, camera);
  }
  loop();
}

boot().catch(e => {
  document.getElementById('lsub').textContent = 'ERROR: ' + e.message;
  console.error(e);
});
</script>
</body>
</html>
