<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DEAD FOREST</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace;}
canvas{display:block;}

/* Loading screen */
#loading{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:300;}
#loading .ltxt{color:#aaddaa;font-size:11px;letter-spacing:6px;margin-bottom:20px;}
#lbar{width:280px;height:3px;background:rgba(255,255,255,.08);border:1px solid rgba(80,160,80,.2);}
#lfill{height:100%;width:0;background:#55cc55;transition:width .3s;}
#lsub{margin-top:12px;font-size:9px;letter-spacing:3px;color:rgba(150,200,150,.4);}
#lerr{margin-top:16px;font-size:9px;letter-spacing:2px;color:#ff5555;display:none;max-width:400px;text-align:center;line-height:1.8;}

/* HUD */
#hud{position:fixed;inset:0;pointer-events:none;z-index:20;}
#xhair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
#xhair::before,#xhair::after{content:'';position:absolute;background:rgba(220,220,160,.7);}
#xhair::before{width:1px;height:12px;left:5px;top:0;}
#xhair::after{width:12px;height:1px;left:0;top:5px;}
#top{position:absolute;top:0;left:0;right:0;padding:16px 22px;display:flex;justify-content:space-between;}
.slbl{font-size:8px;letter-spacing:4px;color:rgba(160,200,160,.4);margin-bottom:3px;}
.sval{font-size:17px;color:#aaddaa;letter-spacing:2px;}
#hw{position:absolute;bottom:28px;left:22px;}
#hbar{width:160px;height:4px;background:rgba(255,255,255,.06);border:1px solid rgba(80,160,80,.2);margin-top:5px;}
#hfill{height:100%;background:linear-gradient(90deg,#1a4a1a,#55cc55);transition:width .25s;}
#sbar{width:160px;height:2px;background:rgba(255,255,255,.04);margin-top:4px;}
#sfill{height:100%;background:rgba(80,160,255,.45);transition:width .08s;}
#aw{position:absolute;bottom:24px;right:22px;text-align:right;}
#anum{font-size:26px;color:#bbeebb;}
#albl{font-size:8px;letter-spacing:4px;color:rgba(130,190,130,.35);margin-top:2px;}
#wmsg{position:absolute;top:43%;left:50%;transform:translateX(-50%);font-size:20px;
  letter-spacing:10px;color:rgba(200,240,200,.85);opacity:0;transition:opacity .5s;white-space:nowrap;}
#dvig{position:fixed;inset:0;pointer-events:none;z-index:15;
  background:radial-gradient(ellipse at center,transparent 50%,rgba(150,0,0,.65) 100%);opacity:0;transition:opacity .12s;}
#vig{position:fixed;inset:0;pointer-events:none;z-index:14;
  background:radial-gradient(ellipse at center,transparent 46%,rgba(0,0,0,.72) 100%);}
#mfl{position:fixed;inset:0;pointer-events:none;z-index:16;background:rgba(255,220,150,.1);opacity:0;}
#rui{position:absolute;bottom:72px;left:50%;transform:translateX(-50%);
  width:110px;display:none;flex-direction:column;align-items:center;gap:4px;}
#rui span{font-size:8px;letter-spacing:4px;color:rgba(170,210,170,.5);}
#rtrack{width:100%;height:2px;background:rgba(255,255,255,.07);}
#rprog{height:100%;width:0;background:#8bc88b;}
#flw{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:6px;font-size:8px;letter-spacing:3px;color:rgba(170,190,170,.28);}
#fldot{width:5px;height:5px;border-radius:50%;background:#cce;box-shadow:0 0 5px #aaf;transition:all .2s;}
#fldot.off{background:#222;box-shadow:none;}
#hm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:18px;height:18px;opacity:0;transition:opacity .07s;}
#hm::before,#hm::after{content:'';position:absolute;background:rgba(255,70,70,.85);}
#hm::before{width:18px;height:1px;top:8px;left:0;}
#hm::after{width:1px;height:18px;left:8px;top:0;}
#ql{position:absolute;top:16px;left:50%;transform:translateX(-50%);
  font-size:8px;letter-spacing:3px;color:rgba(150,200,150,.3);}
#fps{position:absolute;top:30px;left:50%;transform:translateX(-50%);
  font-size:8px;letter-spacing:2px;color:rgba(150,200,150,.22);}

/* Screens */
#ls,#ds{position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:100;}
#ls{background:rgba(0,0,0,.94);display:none;}
#ds{background:rgba(0,0,0,.88);display:none;}
.ttl{font-size:clamp(32px,6vw,70px);letter-spacing:12px;color:#cceecc;
  text-shadow:0 0 40px rgba(80,200,80,.15);margin-bottom:8px;animation:pulse 5s ease-in-out infinite;}
.sub{font-size:9px;letter-spacing:6px;color:rgba(140,190,140,.38);margin-bottom:46px;}
.btn{padding:12px 44px;border:1px solid rgba(100,160,100,.35);background:transparent;
  color:#aaddaa;font-family:'Courier New',monospace;font-size:10px;letter-spacing:6px;
  cursor:pointer;text-transform:uppercase;transition:all .3s;margin:4px;}
.btn:hover{background:rgba(80,160,80,.08);box-shadow:0 0 20px rgba(80,200,80,.12);}
#hint{position:absolute;bottom:18px;font-size:9px;letter-spacing:2px;
  color:rgba(255,255,255,.14);text-align:center;line-height:2.3;}
#fs{font-size:11px;letter-spacing:4px;color:rgba(150,210,150,.5);margin:12px 0 36px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">
  <div class="ltxt">DEAD FOREST</div>
  <div id="lbar"><div id="lfill"></div></div>
  <div id="lsub">LOADING...</div>
  <div id="lerr"></div>
</div>

<!-- Overlays -->
<div id="vig"></div>
<div id="dvig"></div>
<div id="mfl"></div>

<!-- HUD -->
<div id="hud">
  <div id="xhair"></div>
  <div id="hm"></div>
  <div id="top">
    <div><div class="slbl">WAVE</div><div class="sval" id="svw">1</div></div>
    <div id="ql">QUALITY: AUTO</div>
    <div style="text-align:right"><div class="slbl">SCORE</div><div class="sval" id="svs">0</div></div>
  </div>
  <div id="fps"></div>
  <div id="hw">
    <div class="slbl">HEALTH</div>
    <div id="hbar"><div id="hfill" style="width:100%"></div></div>
    <div id="sbar"><div id="sfill" style="width:100%"></div></div>
  </div>
  <div id="aw"><div id="anum">12</div><div id="albl">ROUNDS</div></div>
  <div id="wmsg">-- WAVE 1 --</div>
  <div id="rui"><span>RELOADING</span><div id="rtrack"><div id="rprog"></div></div></div>
  <div id="flw"><div id="fldot"></div><span>LIGHT [F]</span></div>
</div>

<!-- Start screen -->
<div id="ls">
  <div class="ttl">DEAD FOREST</div>
  <div class="sub">THEY HAVE RISEN</div>
  <button class="btn" id="ebtn">ENTER</button>
  <div id="hint">
    WASD -- MOVE &nbsp;|&nbsp; MOUSE -- LOOK &nbsp;|&nbsp; CLICK -- SHOOT &nbsp;|&nbsp;
    R -- RELOAD &nbsp;|&nbsp; SHIFT -- SPRINT &nbsp;|&nbsp; F -- FLASHLIGHT<br>
    Click to lock mouse &nbsp;|&nbsp; ESC to release
  </div>
</div>

<!-- Death screen -->
<div id="ds">
  <div class="ttl" style="font-size:clamp(24px,5vw,52px)">YOU DIED</div>
  <div id="fs"></div>
  <button class="btn" id="rbtn">TRY AGAIN</button>
</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// =====================================================
//  DEAD FOREST  --  Folder-path zombie edition
//
//  FOLDER STRUCTURE REQUIRED:
//  your-folder/
//  |-- horror-fps.html          <- this file
//  \-- Zombie.fbm/
//      |-- Zombie.fbx
//      |-- material_baseColor_0.png
//      \-- material_normal_2.png
//
//  HOW TO RUN (must use local server):
//  Option A: VS Code -> Right click -> Open with Live Server
//  Option B: Terminal inside folder -> python -m http.server 8000
//            Then open: http://localhost:8000/horror-fps.html
// =====================================================

// File paths -- edit these if your folder is named differently
const PATHS = {
  fbx:       'Zombie.fbm/Zombie.fbx',
  baseColor: 'Zombie.fbm/material_baseColor_0.png',
  normal:    'Zombie.fbm/material_normal_2.png',
  walkAnim:  'Zombie.fbm/characters3d.com - Walk Forward.fbx',
  deathAnim: 'Zombie.fbm/characters3d_com_-_Zombie_Death.fbx',
};

// =====================================================
//  STATE
// =====================================================
let renderer, scene, camera, clock;
let gameRunning = false, pointerLocked = false, animId = null;
let health=100, ammo=12, maxAmmo=12, score=0, wave=1;
let reloading=false, reloadT=0, reloadDur=1.8;
let waveEnemies=[], waveSpawned=0, waveTotal=5, waveLeft=5, waveAT=0;
let spawnAccum=0, stamina=100;
const keys = {};
let yaw=0, pitch=0;
const SENS = 0.0019;
const WORLD=120, PH=1.72, PS=5.5, PR=10.5, PRAD=0.45;
let playerPos = new THREE.Vector3(0, PH, 0);
let flashlight, flOn=true;
let gunPivot, gunGroup, muzzleLight;
let bobTime=0, bobAmt=0;
const collidables = [];
let QUALITY = 'HIGH';
let pointLights = [];
let zombieTemplate  = null;  // the loaded FBX object
let walkAnimClip    = null;  // walk animation extracted from Walk Forward.fbx
let deathAnimClip   = null;  // death animation
let zombieBaseTex   = null;  // stored so each clone can get fresh material
let zombieNormTex   = null;
let mTO=null, hmTO=null;
let fpsHistory=[], lastFPSTime=performance.now(), fpsFrames=0;

// DOM refs
const loadingEl = document.getElementById('loading');
const lsEl      = document.getElementById('ls');
const dsEl      = document.getElementById('ds');
const dvigEl    = document.getElementById('dvig');
const mflEl     = document.getElementById('mfl');
const hmEl      = document.getElementById('hm');

// =====================================================
//  BOOT SEQUENCE
// =====================================================
async function boot() {
  setLoad(5, 'Starting renderer...');
  initRenderer();

  setLoad(15, 'Loading FBX parser...');
  try {
    await loadScript('https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/libs/fflate.min.js');
    await loadScript('https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/FBXLoader.js');
    await loadScript('https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/utils/SkeletonUtils.js');
  } catch(e) {
    showError('Could not load FBX parser. Check your internet connection.');
    return;
  }

  setLoad(30, 'Loading textures...');
  let baseColorTex, normalTex;
  try {
    const tl = new THREE.TextureLoader();
    [baseColorTex, normalTex] = await Promise.all([
      loadTex(tl, PATHS.baseColor),
      loadTex(tl, PATHS.normal),
    ]);
    baseColorTex.flipY = false;
    normalTex.flipY    = false;
    zombieBaseTex = baseColorTex;
    zombieNormTex = normalTex;
  } catch(e) {
    showError('Could not load textures from: ' + PATHS.baseColor +
              '<br>Make sure the Zombie.fbm folder is next to this HTML file and you are running a local server.');
    return;
  }

  setLoad(55, 'Loading Zombie.fbx...');
  try {
    const fbxLoader = new THREE.FBXLoader();
    zombieTemplate = await loadFBX(fbxLoader, PATHS.fbx);
  } catch(e) {
    showError('Could not load Zombie.fbx from: ' + PATHS.fbx +
              '<br>Make sure the file exists and you are running a local server (not file://).');
    return;
  }

  setLoad(75, 'Applying textures to zombie...');
  prepareZombie(zombieTemplate, baseColorTex, normalTex);

  setLoad(82, 'Loading walk animation...');
  try {
    const walkFBX = await loadFBX(new THREE.FBXLoader(), PATHS.walkAnim);
    if (walkFBX.animations && walkFBX.animations.length > 0) {
      // Walk Forward is always index [1]; index [0] is the static T-Pose
      walkAnimClip = walkFBX.animations[1] || walkFBX.animations[0];
      console.log('Walk clip:', walkAnimClip.name, 'tracks:', walkAnimClip.tracks.length, 'dur:', walkAnimClip.duration.toFixed(2));



    } else {
      console.warn('No animation found in walk FBX');
    }
  } catch(e) {
    console.warn('Walk animation failed to load:', e.message);
    // Not fatal -- zombies will just stand still
  }
  setLoad(86, 'Loading death animation...');
  try {
    const deathFBX = await loadFBX(new THREE.FBXLoader(), PATHS.deathAnim);
    if (deathFBX.animations && deathFBX.animations.length > 0) {
      // Same structure as walk FBX: [0]=T-Pose (static), [1]=actual animation
      deathAnimClip = deathFBX.animations[1] || deathFBX.animations[0];
      console.log('All death clips:', deathFBX.animations.map(a=>a.name+' ('+a.duration.toFixed(2)+'s)').join(', '));
      console.log('Using death clip:', deathAnimClip.name, 'dur:', deathAnimClip.duration.toFixed(2), 'tracks:', deathAnimClip.tracks.length);
    }
  } catch(e) {
    console.warn('Death animation failed to load:', e.message);
  }


  setLoad(88, 'Building world...');
  buildScene();
  setupCamera();
  buildGun();
  clock = new THREE.Clock();

  setLoad(100, 'Ready!');
  await sleep(400);

  loadingEl.style.display = 'none';
  lsEl.style.display = 'flex';

  // Preview render loop (before game starts)
  (function preview() {
    if (!gameRunning) { requestAnimationFrame(preview); renderer.render(scene, camera); }
  })();
}

function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = res;
    s.onerror = () => rej(new Error('Failed: ' + src));
    document.head.appendChild(s);
  });
}
function loadTex(loader, path) {
  return new Promise((res, rej) => loader.load(path, res, undefined, rej));
}
function loadFBX(loader, path) {
  return new Promise((res, rej) => loader.load(path, res,
    xhr => setLoad(55 + Math.floor((xhr.loaded/xhr.total)*18), 'Loading model ' + Math.round(xhr.loaded/xhr.total*100) + '%...'),
    rej
  ));
}
function setLoad(pct, txt) {
  document.getElementById('lfill').style.width = pct + '%';
  if (txt) document.getElementById('lsub').textContent = txt;
}
function showError(msg) {
  document.getElementById('lerr').innerHTML = msg;
  document.getElementById('lerr').style.display = 'block';
  document.getElementById('lsub').textContent = 'FAILED TO LOAD';
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// =====================================================
//  ZOMBIE SETUP
// =====================================================
let zombieFootOffset = 0; // stored after scaling so clones use it

function prepareZombie(model, baseColorTex, normalTex) {
  // Scale to ~1.85 world units tall
  const box = new THREE.Box3().setFromObject(model);
  const modelH = box.max.y - box.min.y;
  model.scale.setScalar(1.85 / modelH);

  // Measure foot offset AFTER scaling (don't apply to template - clones will use it)
  const box2 = new THREE.Box3().setFromObject(model);
  zombieFootOffset = -box2.min.y;

  // DON'T apply material here - do it fresh on each clone so textures always apply
  console.log('Zombie foot offset:', zombieFootOffset.toFixed(3));
  console.log('Zombie animations:', model.animations.map(a=>a.name).join(', '));
}

function makeFreshZombieMaterial() {
  // Always create a brand new material with textures -- never clone
  return new THREE.MeshStandardMaterial({
    map:         zombieBaseTex,
    normalMap:   zombieNormTex,
    normalScale: new THREE.Vector2(1, 1),
    roughness:   0.85,
    metalness:   0.05,
    skinning:    true,
  });
}

// =====================================================
//  INPUT
// =====================================================
document.getElementById('ebtn').addEventListener('click',
  () => renderer.domElement.requestPointerLock());
document.getElementById('rbtn').addEventListener('click', () => {
  dsEl.style.display = 'none';
  renderer.domElement.requestPointerLock();
});
document.addEventListener('pointerlockchange', () => {
  pointerLocked = !!document.pointerLockElement;
  if (pointerLocked) {
    lsEl.style.display = 'none';
    if (!gameRunning) initGame(); else gameRunning = true;
  } else if (gameRunning) gameRunning = false;
});
document.addEventListener('mousemove', e => {
  if (!pointerLocked) return;
  yaw  -= e.movementX * SENS;
  pitch = Math.max(-1.05, Math.min(0.85, pitch - e.movementY * SENS));
});
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyR' && gameRunning) startReload();
  if (e.code === 'KeyF' && gameRunning) toggleFL();
});
document.addEventListener('keyup', e => keys[e.code] = false);
document.addEventListener('mousedown', e => {
  if (e.button === 0 && gameRunning && pointerLocked) shoot();
});

// =====================================================
//  RENDERER
// =====================================================
function initRenderer() {
  renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.setClearColor(0x010307);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.82;
  document.body.insertBefore(renderer.domElement, document.body.firstChild);
  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });
}

function detectQuality() {
  const gl  = renderer.getContext();
  const dbg = gl.getExtension('WEBGL_debug_renderer_info');
  const gpu = dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : '';
  const mob = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
  if (mob || /intel hd|intel uhd/i.test(gpu) || /mali-4|mali-t|adreno [0-4]/i.test(gpu)) return 'MED';
  return 'HIGH';
}

function applyQuality(q) {
  QUALITY = q;
  document.getElementById('ql').textContent = 'QUALITY: ' + q;
  if (q === 'HIGH') {
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    scene.fog = new THREE.FogExp2(0x030810, 0.016);
  } else if (q === 'MED') {
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.shadowMap.enabled = false;
    scene.fog = new THREE.FogExp2(0x030810, 0.020);
  } else {
    renderer.setPixelRatio(1);
    renderer.shadowMap.enabled = false;
    scene.fog = new THREE.FogExp2(0x030810, 0.028);
  }
}

// =====================================================
//  SCENE
// =====================================================
function buildScene() {
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x030810, 0.016);
  scene.background = new THREE.Color(0x010307);

  scene.add(new THREE.HemisphereLight(0x1a2a4a, 0x0a1a0a, 2.0));
  scene.add(new THREE.AmbientLight(0x1a2a3a, 2.2));

  const moon = new THREE.DirectionalLight(0x8899cc, 1.8);
  moon.position.set(-30, 80, -50);
  moon.castShadow = true;
  moon.shadow.mapSize.set(1024, 1024);
  moon.shadow.camera.near = 1; moon.shadow.camera.far = 200;
  moon.shadow.camera.left = -70; moon.shadow.camera.right = 70;
  moon.shadow.camera.top = 70;  moon.shadow.camera.bottom = -70;
  moon.shadow.bias = -0.0005;
  scene.add(moon);

  // Moon visual
  const moonM = new THREE.Mesh(
    new THREE.SphereGeometry(4, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xddeeff })
  );
  moonM.position.set(-70, 130, -110);
  scene.add(moonM);
  const moonGlow = new THREE.PointLight(0x4466cc, 2.0, 200);
  moonGlow.position.copy(moonM.position);
  scene.add(moonGlow);

  buildSky();
  buildGround();
  buildForestInstanced();

  buildHouse(new THREE.Vector3(22, 0, -18), 0.3);
  buildHouse(new THREE.Vector3(-28, 0, 24), -0.5);
  buildHouse(new THREE.Vector3(6, 0, 34), 0.9);
  buildBarn(new THREE.Vector3(-8, 0, -28));
  buildStaticProps();

  // Eerie scattered lights
  for (const [x, y, z, col, i, d] of [
    [12, .3, 8,   0x552200, .9, 8],
    [-9, .3, -10, 0x441100, .7, 7],
    [2,  .3, 22,  0x553300, .8, 7],
    [-16,.3, 6,   0x332200, .5, 6],
    [26, .3, 12,  0x333300, .4, 5],
  ]) {
    const pl = new THREE.PointLight(col, i, d);
    pl.position.set(x, y, z);
    scene.add(pl);
    pointLights.push({ light: pl, base: i, phase: Math.random() * Math.PI * 2 });
    const em = new THREE.Mesh(
      new THREE.SphereGeometry(.05, 4, 4),
      new THREE.MeshBasicMaterial({ color: col })
    );
    em.position.set(x, y + .05, z);
    scene.add(em);
  }
}

function buildSky() {
  const geo = new THREE.SphereGeometry(190, 16, 10);
  const colors = [];
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const t = Math.max(0, Math.min(1, (pos.getY(i) + 10) / 200));
    colors.push(
      THREE.MathUtils.lerp(.01, .005, t),
      THREE.MathUtils.lerp(.03, .01,  t),
      THREE.MathUtils.lerp(.08, .025, t)
    );
  }
  geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  scene.add(new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ vertexColors: true, side: THREE.BackSide })));

  // Stars
  const sg = new THREE.BufferGeometry();
  const sp = new Float32Array(1500 * 3);
  for (let i = 0; i < 1500 * 3; i += 3) {
    const th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
    sp[i]   = 145 * Math.sin(ph) * Math.cos(th);
    sp[i+1] = 80  + Math.abs(100 * Math.cos(ph));
    sp[i+2] = 145 * Math.sin(ph) * Math.sin(th);
  }
  sg.setAttribute('position', new THREE.Float32BufferAttribute(sp, 3));
  scene.add(new THREE.Points(sg,
    new THREE.PointsMaterial({ color: 0x99bbdd, size: .25, sizeAttenuation: true })
  ));
}

function buildGround() {
  const geo = new THREE.PlaneGeometry(WORLD, WORLD, 60, 60);
  const p = geo.attributes.position;
  for (let i = 0; i < p.count; i++) {
    const x = p.getX(i), z = p.getY(i), d = Math.sqrt(x*x + z*z);
    let h = Math.sin(x*.09)*Math.cos(z*.07)*.7 + Math.sin(x*.2+.4)*Math.cos(z*.18+.3)*.25;
    if (d < 10) h *= d / 10;
    p.setZ(i, h);
  }
  geo.computeVertexNormals();
  const mesh = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color: 0x0d1a08 }));
  mesh.rotation.x = -Math.PI / 2;
  mesh.receiveShadow = true;
  scene.add(mesh);
}

function buildForestInstanced() {
  const TC = 110;
  const dummy = new THREE.Object3D();
  const trunkMat   = new THREE.MeshLambertMaterial({ color: 0x1a0f06 });
  const foliageMat = new THREE.MeshLambertMaterial({ color: 0x080e04 });
  const deadMat    = new THREE.MeshLambertMaterial({ color: 0x1a1610 });

  const iTrunk = new THREE.InstancedMesh(new THREE.CylinderGeometry(.1, .17, 2, 6), trunkMat, TC);
  const iC1    = new THREE.InstancedMesh(new THREE.ConeGeometry(1, 2.5, 6), foliageMat, TC);
  const iC2    = new THREE.InstancedMesh(new THREE.ConeGeometry(1, 2.5, 6), foliageMat, TC);
  const iC3    = new THREE.InstancedMesh(new THREE.ConeGeometry(1, 2.5, 6), foliageMat, TC);
  [iTrunk, iC1, iC2, iC3].forEach(m => { m.castShadow = true; m.receiveShadow = true; });

  function tooClose(x, z) { return x*x + z*z < 64; }
  function nearBuilding(x, z) {
    return (Math.abs(x-22)<10 && Math.abs(z+18)<9) ||
           (Math.abs(x+28)<10 && Math.abs(z-24)<9) ||
           (Math.abs(x-6)<9  && Math.abs(z-34)<9)  ||
           (Math.abs(x+8)<9  && Math.abs(z+28)<9);
  }

  let placed = 0;
  for (let i = 0; i < TC * 4 && placed < TC; i++) {
    const a = Math.random()*Math.PI*2, dist = 9 + Math.random()*52;
    const tx = Math.cos(a)*dist, tz = Math.sin(a)*dist;
    if (tooClose(tx, tz) || nearBuilding(tx, tz)) continue;
    const h = 5 + Math.random()*8, ry = Math.random()*Math.PI*2, s = h/13;
    dummy.position.set(tx, h*.18, tz); dummy.rotation.set(0,ry,0); dummy.scale.set(1,h*.2,1); dummy.updateMatrix(); iTrunk.setMatrixAt(placed,dummy.matrix);
    dummy.position.set(tx, h*.32, tz); dummy.scale.set(s*2.8,s*1.8,s*2.8); dummy.rotation.set(0,ry,0); dummy.updateMatrix(); iC1.setMatrixAt(placed,dummy.matrix);
    dummy.position.set(tx, h*.56, tz); dummy.scale.set(s*2.2,s*1.6,s*2.2); dummy.updateMatrix(); iC2.setMatrixAt(placed,dummy.matrix);
    dummy.position.set(tx, h*.78, tz); dummy.scale.set(s*1.4,s*1.4,s*1.4); dummy.updateMatrix(); iC3.setMatrixAt(placed,dummy.matrix);
    collidables.push({ min: new THREE.Vector3(tx-.45,-1,tz-.45), max: new THREE.Vector3(tx+.45,h+1,tz+.45) });
    placed++;
  }
  [iTrunk, iC1, iC2, iC3].forEach(m => m.instanceMatrix.needsUpdate = true);
  scene.add(iTrunk, iC1, iC2, iC3);

  // Dead trees
  const DEAD = 28;
  const iDead = new THREE.InstancedMesh(new THREE.CylinderGeometry(.05,.14,1,5), deadMat, DEAD);
  iDead.castShadow = true;
  let dp = 0;
  for (let i = 0; i < DEAD*4 && dp < DEAD; i++) {
    const a = Math.random()*Math.PI*2, dist = 7 + Math.random()*50;
    const tx = Math.cos(a)*dist, tz = Math.sin(a)*dist;
    if (tooClose(tx, tz) || nearBuilding(tx, tz)) continue;
    const h = 3 + Math.random()*5;
    dummy.position.set(tx,h*.5,tz); dummy.rotation.set((Math.random()-.5)*.12,Math.random()*Math.PI*2,0); dummy.scale.set(1,h,1); dummy.updateMatrix();
    iDead.setMatrixAt(dp, dummy.matrix);
    collidables.push({ min: new THREE.Vector3(tx-.25,-1,tz-.25), max: new THREE.Vector3(tx+.25,h+1,tz+.25) });
    dp++;
  }
  iDead.instanceMatrix.needsUpdate = true;
  scene.add(iDead);
}

function gm(k, fn) { if (!MAT[k]) MAT[k] = fn(); return MAT[k]; }

function mergeGeos(geos) {
  let tv=0, ti=0;
  const hasIdx = geos.every(g => g.index !== null);
  for (const g of geos) { tv += g.attributes.position.count; if (hasIdx&&g.index) ti+=g.index.count; }
  const pos=new Float32Array(tv*3), nrm=new Float32Array(tv*3), idx=hasIdx?new Uint32Array(ti):null;
  let vo=0, io=0, vb=0;
  for (const g of geos) {
    const p=g.attributes.position.array, n=g.attributes.normal?g.attributes.normal.array:null;
    pos.set(p,vo*3); if(n)nrm.set(n,vo*3);
    if(hasIdx&&g.index&&idx){const id=g.index.array;for(let i=0;i<id.length;i++)idx[io+i]=id[i]+vb;io+=id.length;}
    vb+=g.attributes.position.count; vo+=g.attributes.position.count;
  }
  const out = new THREE.BufferGeometry();
  out.setAttribute('position', new THREE.BufferAttribute(pos,3));
  out.setAttribute('normal',   new THREE.BufferAttribute(nrm,3));
  if (idx) out.setIndex(new THREE.BufferAttribute(idx,1));
  return out;
}

function buildStaticProps() {
  const rg = [], lg = [], fg = [];
  const rGeo = new THREE.DodecahedronGeometry(1, 0);
  for (let i = 0; i < 55; i++) {
    const a=Math.random()*Math.PI*2, d=3+Math.random()*58, rx=Math.cos(a)*d, rz=Math.sin(a)*d, s=.15+Math.random()*.75;
    const g2=rGeo.clone();
    g2.applyMatrix4(new THREE.Matrix4().makeScale(s,s*(.5+Math.random()*.7),s)
      .premultiply(new THREE.Matrix4().makeRotationY(Math.random()*Math.PI*2))
      .premultiply(new THREE.Matrix4().makeTranslation(rx,s*.35,rz)));
    rg.push(g2);
    if(s>.5) collidables.push({min:new THREE.Vector3(rx-s,-1,rz-s),max:new THREE.Vector3(rx+s,s*2,rz+s)});
  }
  const lGeo = new THREE.CylinderGeometry(.15,.18,1,6,1);
  for (let i = 0; i < 18; i++) {
    const a=Math.random()*Math.PI*2, d=5+Math.random()*45, lx=Math.cos(a)*d, lz=Math.sin(a)*d;
    const g2=lGeo.clone();
    g2.applyMatrix4(new THREE.Matrix4().makeScale(1,1.5+Math.random()*2.5,1)
      .premultiply(new THREE.Matrix4().makeRotationZ(Math.PI/2+(Math.random()-.5)*.3))
      .premultiply(new THREE.Matrix4().makeRotationY(Math.random()*Math.PI))
      .premultiply(new THREE.Matrix4().makeTranslation(lx,.16,lz)));
    lg.push(g2);
  }
  const pG=new THREE.BoxGeometry(.1,1.3,.1), rG2=new THREE.BoxGeometry(1.8,.07,.06);
  for (const {ox,oz,len,ang} of [{ox:18,oz:-8,len:7,ang:.1},{ox:-12,oz:12,len:6,ang:-.18},{ox:5,oz:-22,len:8,ang:.06}]) {
    for (let i=0;i<len;i++) {
      const px=ox+Math.cos(ang)*i*1.8, pz=oz+Math.sin(ang)*i*1.8;
      const pg=pG.clone(); pg.applyMatrix4(new THREE.Matrix4().makeTranslation(px,.65,pz)); fg.push(pg);
      if(i<len-1) {
        for (const ry2 of [.68,.33]) {
          const rg2=rG2.clone();
          rg2.applyMatrix4(new THREE.Matrix4().makeRotationY(ang).premultiply(new THREE.Matrix4().makeTranslation(px+Math.cos(ang)*.9,ry2,pz+Math.sin(ang)*.9)));
          fg.push(rg2);
        }
      }
    }
  }
  try { const m=mergeGeos([...rg,...lg]); if(m){const mesh=new THREE.Mesh(m,new THREE.MeshLambertMaterial({color:0x1e1c14}));mesh.castShadow=true;mesh.receiveShadow=true;scene.add(mesh);} } catch(e){}
  try { const m=mergeGeos(fg); if(m){const mesh=new THREE.Mesh(m,new THREE.MeshLambertMaterial({color:0x1a1208}));mesh.castShadow=true;scene.add(mesh);} } catch(e){}
}

// =====================================================
//  COLLISION
// =====================================================
function collide(pos, r) {
  for (const b of collidables) {
    if (pos.x+r>b.min.x && pos.x-r<b.max.x && pos.z+r>b.min.z && pos.z-r<b.max.z && pos.y>b.min.y && pos.y<b.max.y) return true;
  }
  return false;
}
function moveP(pos, delta) {
  const nx = new THREE.Vector3(pos.x+delta.x, pos.y, pos.z);
  if (!collide(nx, PRAD)) pos.x = nx.x;
  const nz = new THREE.Vector3(pos.x, pos.y, pos.z+delta.z);
  if (!collide(nz, PRAD)) pos.z = nz.z;
  pos.x = Math.max(-WORLD*.5+1, Math.min(WORLD*.5-1, pos.x));
  pos.z = Math.max(-WORLD*.5+1, Math.min(WORLD*.5-1, pos.z));
}
function moveE(pos, delta) {
  const R = .44;
  const nx = new THREE.Vector3(pos.x+delta.x, pos.y, pos.z); if (!collide(nx,R)) pos.x=nx.x;
  const nz = new THREE.Vector3(pos.x, pos.y, pos.z+delta.z); if (!collide(nz,R)) pos.z=nz.z;
}

// =====================================================
//  ENEMIES  --  Real zombie model
// =====================================================
function randomSpawn() {
  for (let t = 0; t < 25; t++) {
    const a=Math.random()*Math.PI*2, d=22+Math.random()*28;
    const x=Math.cos(a)*d, z=Math.sin(a)*d;
    const p=new THREE.Vector3(x,PH,z);
    if (!collide(p, 1.2)) return p;
  }
  return new THREE.Vector3(30, PH, 30);
}

function createEnemy() {
  const sp    = randomSpawn();
  const tier  = Math.floor(Math.random() * 3);
  const speeds = [4.0, 5.5, 2.8];
  const hps    = [3,   2,   7  ];

  // Use SkeletonUtils.clone -- the ONLY correct way to clone SkinnedMesh in Three.js r128
  // Regular .clone(true) shares skeleton bones between instances which breaks animation
  const zombieClone = zombieTemplate ? THREE.SkeletonUtils.clone(zombieTemplate) : null;
  let mixer = null;

  if (zombieClone) {
    // Apply fresh material to every mesh
    zombieClone.traverse(child => {
      if (!child.isMesh) return;
      child.material      = makeFreshZombieMaterial();
      child.castShadow    = true;
      child.receiveShadow = true;
    });

    // Mixer on the cloned root -- SkeletonUtils.clone gives it its own skeleton
    mixer = new THREE.AnimationMixer(zombieClone);

    if (walkAnimClip) {
      const action = mixer.clipAction(walkAnimClip);
      action.setLoop(THREE.LoopRepeat, Infinity);
      action.timeScale = [1.0, 1.5, 0.65][tier];
      action.play();
    }

    // Measure this clone's foot offset and lift it so feet sit at y=0 inside the pivot
    const cloneBox = new THREE.Box3().setFromObject(zombieClone);
    zombieClone.position.y = Math.max(0, -cloneBox.min.y);
  }

  // Wrap in a pivot Group -- rotate the GROUP not the animated FBX mesh
  // This prevents rotation fighting with AnimationMixer bone transforms
  const pivot = new THREE.Group();
  pivot.position.set(sp.x, 0, sp.z);
  if (zombieClone) pivot.add(zombieClone);

  // Eye glow light on the pivot
  // Eye glow light on the pivot
  const eyeLight = new THREE.PointLight(0xff2200, 1.0, 4);
  eyeLight.position.set(0, 1.6, .2);
  pivot.add(eyeLight);

  scene.add(pivot);

  const maxHp = hps[tier] + Math.floor(wave / 2);
  waveEnemies.push({
    mesh:    pivot,       // pivot is what we move/rotate
    body:    zombieClone, // the actual FBX mesh (animated)
    eyeLight, mixer,
    pos:     sp.clone(),
    footY:   0,           // pivot sits at y=0, footY baked into zombieClone.position.y
    hp: maxHp, maxHp,
    speed:   speeds[tier] + wave * .28,
    roamDir: new THREE.Vector3(Math.random()-.5, 0, Math.random()-.5).normalize(),
    roamT: 0, attackT: 0, dead: false, tier,
  });
}


// =====================================================
//  SHOOTING
// =====================================================
const raycaster = new THREE.Raycaster();
function shoot() {
  if (reloading || ammo <= 0) { if (ammo <= 0) startReload(); return; }
  ammo--; updateHUD(); doMuzzle();
  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
  let best=null, bd=Infinity;
  for (const e of waveEnemies) {
    if (e.dead) continue;
    const d     = raycaster.ray.distanceToPoint(e.pos);
    const along = raycaster.ray.origin.distanceTo(e.pos);
    if (d < .75 && along < bd && along > .3) { bd = along; best = e; }
  }
  if (best) {
    best.hp--;
    showHM();
    // Flash red on hit
    const flashTarget = best.body || best.mesh;
    flashTarget.traverse(c => {
      if (c.isMesh && c.material) {
        c.material.emissive = new THREE.Color(.5, 0, 0);
        setTimeout(() => { if (c.material) c.material.emissive.set(0,0,0); }, 130);
      }
    });
    if (best.hp <= 0) killEnemy(best);
  }
  if (ammo === 0) setTimeout(startReload, 320);
}

function startReload() {
  if (reloading || ammo === maxAmmo) return;
  reloading = true; reloadT = 0;
  document.getElementById('rui').style.display = 'flex';
}
function killEnemy(e) {
  e.dead = true;
  score += 200 * wave; waveLeft--;
  updateHUD();

  if (e.mixer && deathAnimClip) {
    // Stop all current actions (walk etc.) immediately
    e.mixer.stopAllAction();
    // Create death action -- clipAction matches tracks to bones by name
    const deathAction = e.mixer.clipAction(deathAnimClip);
    deathAction.reset();
    deathAction.setLoop(THREE.LoopOnce, 1);
    deathAction.clampWhenFinished = true;
    deathAction.enabled = true;
    deathAction.weight = 1;
    deathAction.timeScale = 1.0;
    deathAction.play();
    // Keep updating this mixer until death anim finishes
    e.dyingUntil = performance.now() / 1000 + deathAnimClip.duration + 0.5;
    setTimeout(() => scene.remove(e.mesh), (deathAnimClip.duration * 1000) + 500);
  } else {
    // Fallback: tip over if no death anim
    e.mesh.rotation.x = Math.PI / 2.2;
    setTimeout(() => scene.remove(e.mesh), 900);
  }

  if (waveLeft <= 0 && waveSpawned >= waveTotal) nextWave();
}
function nextWave() {
  wave++; waveTotal = 4 + wave*2; waveLeft = waveTotal;
  waveSpawned = 0; spawnAccum = 0;
  updateHUD(); announceWave();
}
function takeDmg(d) {
  health = Math.max(0, health-d); updateHUD();
  dvigEl.style.opacity = 1; setTimeout(() => dvigEl.style.opacity=0, 260);
  if (health <= 0) die();
}
function die() {
  gameRunning = false; document.exitPointerLock();
  dsEl.style.display = 'flex';
  document.getElementById('fs').textContent = 'SCORE: ' + score + '  |  WAVE: ' + wave;
}
function doMuzzle() {
  mflEl.style.opacity=1; muzzleLight.intensity=10; gunPivot.rotation.x=-.11;
  clearTimeout(mTO); mTO=setTimeout(()=>{mflEl.style.opacity=0;muzzleLight.intensity=0;},65);
}
function showHM() {
  hmEl.style.opacity=1; clearTimeout(hmTO); hmTO=setTimeout(()=>hmEl.style.opacity=0,130);
}
function announceWave() {
  const el=document.getElementById('wmsg'); el.textContent='-- WAVE '+wave+' --';
  el.style.opacity=1; waveAT=3.5;
}
function updateHUD() {
  document.getElementById('hfill').style.width = Math.max(0,health)+'%';
  document.getElementById('svs').textContent   = score;
  document.getElementById('svw').textContent   = wave;
  document.getElementById('anum').textContent  = reloading ? '--' : ammo;
}

// =====================================================
//  FPS MONITOR + AUTO QUALITY
// =====================================================
function trackFPS(now) {
  fpsFrames++;
  if (now - lastFPSTime > 1000) {
    const fps = fpsFrames / ((now-lastFPSTime)/1000);
    document.getElementById('fps').textContent = Math.round(fps) + ' FPS';
    fpsHistory.push(fps); if (fpsHistory.length>5) fpsHistory.shift();
    if (fpsHistory.length >= 4) {
      const avg = fpsHistory.reduce((a,b)=>a+b,0)/fpsHistory.length;
      if      (avg<35 && QUALITY==='HIGH') applyQuality('MED');
      else if (avg<22 && QUALITY==='MED' ) applyQuality('LOW');
    }
    lastFPSTime=now; fpsFrames=0;
  }
}

// =====================================================
//  GAME INIT
// =====================================================
function initGame() {
  health=100; ammo=maxAmmo; score=0; wave=1; stamina=100;
  reloading=false; reloadT=0;
  waveEnemies.forEach(e => scene.remove(e.mesh));
  waveEnemies=[]; waveSpawned=0; waveTotal=5; waveLeft=5; waveAT=0; spawnAccum=0;
  yaw=0; pitch=0; playerPos.set(0,PH,0);
  clock = new THREE.Clock();
  flashlight.intensity=8; flOn=true;
  document.getElementById('fldot').classList.remove('off');
  applyQuality(detectQuality());
  updateHUD(); announceWave();
  gameRunning=true;
  if (animId) cancelAnimationFrame(animId);
  loop();
}

function getSpawnInterval() { return Math.max(1.6, 5.5 - wave*.4); }

// =====================================================
//  MAIN LOOP
// =====================================================
function loop() {
  animId = requestAnimationFrame(loop);
  const now = performance.now();
  if (gameRunning) trackFPS(now);
  if (!gameRunning) { renderer.render(scene, camera); return; }

  const dt      = Math.min(clock.getDelta(), .05);
  const elapsed = clock.getElapsedTime();

  // -- Movement --
  const wantRun = (keys['ShiftLeft']||keys['ShiftRight']) && stamina>5;
  const spd = wantRun ? PR : PS;
  stamina = wantRun ? Math.max(0,stamina-dt*28) : Math.min(100,stamina+dt*16);
  document.getElementById('sfill').style.width = stamina+'%';

  const fwd   = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  const right = new THREE.Vector3( Math.cos(yaw), 0, -Math.sin(yaw));
  const move  = new THREE.Vector3();
  if (keys['KeyW']||keys['ArrowUp'])    move.addScaledVector(fwd,   spd*dt);
  if (keys['KeyS']||keys['ArrowDown'])  move.addScaledVector(fwd,  -spd*dt);
  if (keys['KeyA']||keys['ArrowLeft'])  move.addScaledVector(right,-spd*dt);
  if (keys['KeyD']||keys['ArrowRight']) move.addScaledVector(right, spd*dt);
  const moving = move.lengthSq() > 0;
  moveP(playerPos, move);

  // Head bob
  if (moving) { bobTime+=dt*(wantRun?14:9); bobAmt=Math.min(1,bobAmt+dt*4); }
  else        { bobAmt=Math.max(0,bobAmt-dt*5); }
  const bobY = Math.sin(bobTime)*bobAmt*.055;
  const bobX = Math.cos(bobTime*.5)*bobAmt*.022;

  camera.position.set(playerPos.x+bobX, PH+bobY, playerPos.z);
  camera.rotation.order='YXZ';
  camera.rotation.y=yaw;
  camera.rotation.x=pitch;

  // Gun bob + recoil spring
  gunPivot.rotation.x += (0-gunPivot.rotation.x) * .14;
  gunPivot.position.x  = .3 + Math.sin(bobTime*.5)*bobAmt*.011;
  gunPivot.position.y  = -1.65 + Math.sin(bobTime)*bobAmt*.016 + Math.sin(elapsed*.7)*.003;

  // Flashlight flicker
  if (flOn) flashlight.intensity = 8+Math.sin(elapsed*18)*.07+Math.sin(elapsed*47)*.025;

  // -- Reload --
  if (reloading) {
    reloadT += dt;
    const p = Math.min(1, reloadT/reloadDur);
    document.getElementById('rprog').style.width = (p*100)+'%';
    if (p >= 1) { reloading=false; ammo=maxAmmo; document.getElementById('rui').style.display='none'; updateHUD(); }
  }

  // -- Wave announce --
  if (waveAT > 0) { waveAT-=dt; if(waveAT<=0) document.getElementById('wmsg').style.opacity=0; }

  // -- Spawn enemies --
  if (waveSpawned < waveTotal) {
    spawnAccum += dt;
    if (spawnAccum >= getSpawnInterval()) { spawnAccum=0; createEnemy(); waveSpawned++; }
  }

  // -- Update animation mixers --
  const now_s = performance.now() / 1000;
  for (const e of waveEnemies) {
    if (!e.mixer) continue;
    // Update living enemies always; update dying enemies until death anim finishes
    if (!e.dead || (e.dyingUntil && now_s < e.dyingUntil)) {
      e.mixer.update(dt);
    }
  }

  // -- Enemy AI --
  const pp = playerPos.clone();
  for (const e of waveEnemies) {
    if (e.dead) continue;
    const toP  = new THREE.Vector3(pp.x-e.pos.x, 0, pp.z-e.pos.z);
    const dist = toP.length();

    // Smoothly rotate the PIVOT toward player (not the animated FBX body)
    const targetAngle = Math.atan2(pp.x-e.pos.x, pp.z-e.pos.z);
    let da = targetAngle - e.mesh.rotation.y;
    // Wrap angle to [-PI, PI]
    while (da > Math.PI)  da -= Math.PI*2;
    while (da < -Math.PI) da += Math.PI*2;
    e.mesh.rotation.y += da * Math.min(1, dt * 8);

    const STOP_DIST = 1.8; // stop this far from player -- wide enough to prevent jitter
    if (dist < 35) {
      if (dist > STOP_DIST) {
        moveE(e.pos, toP.clone().normalize().multiplyScalar(e.speed*dt));
      }
      // Move the PIVOT (not the animated mesh) -- no rotation conflict
      e.mesh.position.set(e.pos.x, 0, e.pos.z);
      if (dist < STOP_DIST + 0.3) { e.attackT+=dt; if(e.attackT>.88){takeDmg(10);e.attackT=0;} }
      else e.attackT=0;
    } else {
      e.roamT+=dt;
      if (e.roamT>3) { e.roamDir.set(Math.random()-.5,0,Math.random()-.5).normalize(); e.roamT=0; }
      const before=e.pos.clone();
      moveE(e.pos, e.roamDir.clone().multiplyScalar(e.speed*.3*dt));
      if (e.pos.distanceTo(before)<.001) e.roamDir.set(Math.random()-.5,0,Math.random()-.5).normalize();
      e.mesh.position.set(e.pos.x, 0, e.pos.z);
    }

    // Eye light pulse
    if (QUALITY !== 'LOW' || dist < 15)
      e.eyeLight.intensity = 1.0 + Math.sin(elapsed*2.5 + e.pos.x*.7) * .4;
  }

  // -- Flicker point lights --
  if (QUALITY !== 'LOW' || Math.round(elapsed*60)%2===0) {
    for (const pl of pointLights) {
      pl.light.intensity = pl.base + Math.sin(elapsed*1.8+pl.phase)*.28 + Math.sin(elapsed*5.9+pl.phase*2)*.1;
    }
  }

  renderer.render(scene, camera);
}

// =====================================================
//  START
// =====================================================
boot().catch(err => {
  showError('Unexpected error: ' + err.message + '<br>Check the browser console for details.');
  console.error(err);
});
</script>
</body>
</html>
